<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dépôt Python – Lycée Denis Diderot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    #editor { height: 380px; border: 1px solid #d1d5db; border-radius: 0.5rem; overflow: hidden; }
    .badge-pass { background:#dcfce7; color:#166534; }
    .badge-fail { background:#fee2e2; color:#991b1b; }
    .badge-warn { background:#fef9c3; color:#854d0e; }
    #pyodide-status { transition: all 0.3s; }
    .spin { animation: spin 1s linear infinite; display:inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ─── Header ─────────────────────────────────────────────────────────── -->
<header class="bg-blue-700 text-white shadow">
  <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold">🐍 Dépôt de programmes Python</h1>
      <p class="text-blue-200 text-sm">Lycée Denis Diderot – Belfort</p>
    </div>
    <div id="pyodide-status" class="text-xs bg-blue-800 rounded-full px-3 py-1 flex items-center gap-2">
      <span class="spin">⟳</span> Chargement Python…
    </div>
  </div>
</header>

<!-- ─── Main ────────────────────────────────────────────────────────────── -->
<main class="max-w-4xl mx-auto px-4 py-8 space-y-6">

  <!-- Infos étudiant -->
  <section class="bg-white rounded-xl shadow p-6 space-y-4">
    <h2 class="text-lg font-semibold text-gray-800">👤 Vos informations</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nom et prénom *</label>
        <input id="student-name" type="text" placeholder="Ex : Martin Jean"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Classe *</label>
        <select id="class-id"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
          <option value="">— Sélectionnez —</option>
          <option>1BTS SN</option>
          <option>2BTS SN</option>
          <option>Terminale STI2D</option>
          <option>Bac Pro</option>
          <option>UPE2A</option>
          <option>Autre</option>
        </select>
      </div>
    </div>
  </section>

  <!-- Choix de l'exercice -->
  <section class="bg-white rounded-xl shadow p-6 space-y-4">
    <h2 class="text-lg font-semibold text-gray-800">📋 Exercice</h2>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Sujet *</label>
      <select id="exercise-select"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
        <option value="">— Chargement… —</option>
      </select>
    </div>
    <div id="exercise-info" class="hidden bg-blue-50 rounded-lg p-4 space-y-2">
      <p id="exercise-desc" class="text-sm text-gray-700 whitespace-pre-wrap"></p>
      <p id="exercise-deadline" class="text-xs text-orange-600 font-medium"></p>
      <p id="test-count" class="text-xs text-gray-500"></p>
    </div>
  </section>

  <!-- Éditeur de code -->
  <section class="bg-white rounded-xl shadow p-6 space-y-4">
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-semibold text-gray-800">✏️ Votre programme</h2>
      <button id="clear-btn" class="text-xs text-gray-400 hover:text-red-500 transition">
        🗑 Effacer
      </button>
    </div>
    <div id="editor"></div>

    <!-- Boutons action -->
    <div class="flex flex-wrap gap-3 pt-2">
      <button id="run-btn"
        class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 disabled:opacity-50">
        ▶ Exécuter
      </button>
      <button id="test-btn"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 disabled:opacity-50 hidden">
        🧪 Lancer les tests
      </button>
      <button id="submit-btn"
        class="bg-blue-700 hover:bg-blue-800 text-white px-5 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 disabled:opacity-50">
        📤 Soumettre
      </button>
    </div>
  </section>

  <!-- Output -->
  <section id="output-section" class="bg-white rounded-xl shadow p-6 space-y-3 hidden">
    <h2 class="text-lg font-semibold text-gray-800">🖥 Sortie du programme</h2>
    <pre id="output-box"
      class="bg-gray-900 text-green-400 rounded-lg p-4 text-sm font-mono overflow-x-auto whitespace-pre-wrap max-h-64"></pre>
  </section>

  <!-- Résultats des tests -->
  <section id="test-section" class="bg-white rounded-xl shadow p-6 space-y-3 hidden">
    <h2 class="text-lg font-semibold text-gray-800">🧪 Résultats des tests</h2>
    <div id="test-results" class="space-y-2"></div>
    <div id="test-score" class="text-sm font-semibold mt-2"></div>
  </section>

  <!-- Message soumission -->
  <div id="submit-msg" class="hidden"></div>

</main>

<footer class="text-center text-xs text-gray-400 py-6">
  Lycée Denis Diderot – Belfort &nbsp;|&nbsp;
  <a href="teacher.html" class="hover:text-blue-500">Accès professeur</a>
</footer>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────────────
const API_URL = "https://python-submit.onrender.com"; // ← REMPLACER après déploiement

// ─── État global ─────────────────────────────────────────────────────────────
let pyodide = null;
let monacoEditor = null;
let currentExercise = null;
let lastOutput = "";
let lastTestResults = [];

// ─── Monaco ──────────────────────────────────────────────────────────────────
require.config({ paths: { vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs" }});
require(["vs/editor/editor.main"], () => {
  monacoEditor = monaco.editor.create(document.getElementById("editor"), {
    value: `# Écrivez votre programme ici\nprint("Bonjour !")`,
    language: "python",
    theme: "vs-dark",
    fontSize: 14,
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    automaticLayout: true,
  });
});

// ─── Pyodide ─────────────────────────────────────────────────────────────────
async function loadPyodideEnv() {
  try {
    // Charger Pyodide dynamiquement après Monaco pour éviter les conflits
    await new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = "https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js";
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });
    pyodide = await loadPyodide({
      indexURL: "https://cdn.jsdelivr.net/pyodide/v0.26.2/full/"
    });
    const statusEl = document.getElementById("pyodide-status");
    statusEl.innerHTML = "✅ Python prêt";
    statusEl.classList.replace("bg-blue-800", "bg-green-700");
    document.getElementById("run-btn").disabled = false;
    document.getElementById("test-btn").disabled = false;
    document.getElementById("submit-btn").disabled = false;
  } catch(e) {
    const statusEl = document.getElementById("pyodide-status");
    statusEl.innerHTML = "❌ Erreur Python";
    statusEl.classList.replace("bg-blue-800", "bg-red-700");
    console.error("Pyodide failed to load:", e);
  }
}
loadPyodideEnv();

// ─── Exercices ────────────────────────────────────────────────────────────────
async function loadExercises() {
  try {
    const res = await fetch(`${API_URL}/exercises`);
    const exercises = await res.json();
    const sel = document.getElementById("exercise-select");
    sel.innerHTML = '<option value="">— Sélectionnez un exercice —</option>';
    exercises.forEach(ex => {
      const opt = document.createElement("option");
      opt.value = ex.id;
      opt.textContent = ex.title + (ex.deadline ? ` (avant le ${formatDate(ex.deadline)})` : "");
      sel.appendChild(opt);
    });
  } catch (e) {
    document.getElementById("exercise-select").innerHTML =
      '<option value="">⚠ Impossible de charger les exercices</option>';
  }
}

document.getElementById("exercise-select").addEventListener("change", async (e) => {
  const id = e.target.value;
  const infoEl = document.getElementById("exercise-info");
  if (!id) { infoEl.classList.add("hidden"); currentExercise = null; return; }
  try {
    const res = await fetch(`${API_URL}/exercises/${id}`);
    currentExercise = await res.json();
    document.getElementById("exercise-desc").textContent =
      currentExercise.description || "Aucune description.";
    document.getElementById("exercise-deadline").textContent =
      currentExercise.deadline ? `⏰ Date limite : ${formatDate(currentExercise.deadline)}` : "";
    const tc = currentExercise.test_cases || [];
    document.getElementById("test-count").textContent =
      tc.length > 0 ? `🧪 ${tc.length} test(s) automatique(s) disponible(s)` : "Pas de tests automatiques.";
    document.getElementById("test-btn").classList.toggle("hidden", tc.length === 0);
    infoEl.classList.remove("hidden");
  } catch (e) {
    console.error(e);
  }
});

loadExercises();

// ─── Exécution simple ─────────────────────────────────────────────────────────
document.getElementById("run-btn").addEventListener("click", async () => {
  if (!pyodide) return alert("Python se charge encore, patientez…");
  const code = monacoEditor.getValue();
  const [output, err] = await runCode(code, []);
  lastOutput = output + (err ? "\n--- ERREUR ---\n" + err : "");
  showOutput(lastOutput);
});

// ─── Tests automatiques ───────────────────────────────────────────────────────
document.getElementById("test-btn").addEventListener("click", async () => {
  if (!pyodide) return alert("Python se charge encore…");
  if (!currentExercise) return alert("Sélectionnez un exercice.");
  const code = monacoEditor.getValue();
  const testCases = currentExercise.test_cases || [];
  lastTestResults = [];
  let passed = 0;

  const resultsEl = document.getElementById("test-results");
  resultsEl.innerHTML = "";
  document.getElementById("test-section").classList.remove("hidden");

  for (let i = 0; i < testCases.length; i++) {
    const tc = testCases[i];
    const [output, err] = await runCode(code, tc.inputs || []);
    const actual = output.trim();
    const expected = (tc.expected_output || "").trim();
    const ok = actual === expected;
    if (ok) passed++;

    lastTestResults.push({ label: tc.label || `Test ${i+1}`, passed: ok, actual, expected, error: err });

    const div = document.createElement("div");
    div.className = `rounded-lg p-3 text-sm ${ok ? "badge-pass" : "badge-fail"}`;
    div.innerHTML = `
      <div class="font-semibold">${ok ? "✅" : "❌"} ${tc.label || "Test " + (i+1)}</div>
      ${err ? `<div class="mt-1 font-mono text-xs">Erreur : ${escHtml(err)}</div>` : ""}
      ${!ok ? `
        <div class="mt-1 font-mono text-xs">Attendu : <b>${escHtml(expected)}</b></div>
        <div class="font-mono text-xs">Obtenu  : <b>${escHtml(actual)}</b></div>` : ""}
    `;
    resultsEl.appendChild(div);
  }

  document.getElementById("test-score").textContent =
    `Score : ${passed} / ${testCases.length} test(s) réussi(s)`;
});

// ─── Soumission ───────────────────────────────────────────────────────────────
document.getElementById("submit-btn").addEventListener("click", async () => {
  const name = document.getElementById("student-name").value.trim();
  const cls  = document.getElementById("class-id").value;
  if (!name) return showError("Veuillez entrer votre nom.");
  if (!cls)  return showError("Veuillez sélectionner votre classe.");
  if (!currentExercise) return showError("Veuillez sélectionner un exercice.");

  const code = monacoEditor.getValue().trim();
  if (!code) return showError("Votre programme est vide.");

  const btn = document.getElementById("submit-btn");
  btn.textContent = "⏳ Envoi…";
  btn.disabled = true;

  try {
    const res = await fetch(`${API_URL}/submit`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        student_name: name,
        class_id: cls,
        exercise_id: currentExercise.id,
        code,
        output: lastOutput,
        test_results: lastTestResults,
      }),
    });
    if (!res.ok) throw new Error(await res.text());
    showSubmitMsg("✅ Programme déposé avec succès ! Votre professeur le recevra.", "green");
  } catch (e) {
    showSubmitMsg("❌ Erreur lors de l'envoi : " + e.message, "red");
  } finally {
    btn.textContent = "📤 Soumettre";
    btn.disabled = false;
  }
});

// ─── Clear ────────────────────────────────────────────────────────────────────
document.getElementById("clear-btn").addEventListener("click", () => {
  if (confirm("Effacer le code ?")) monacoEditor.setValue("");
});

// ─── Helpers ──────────────────────────────────────────────────────────────────

async function runCode(code, inputs) {
  const wrappedCode = `
import sys, builtins
from io import StringIO

_inputs = ${JSON.stringify(inputs)}
_idx = 0
def _mock_input(prompt=""):
    global _idx
    if _idx < len(_inputs):
        v = _inputs[_idx]; _idx += 1; return v
    return ""

builtins.input = _mock_input
sys.stdout = StringIO()
_err = ""
try:
    exec(${JSON.stringify(code)})
except Exception as e:
    _err = str(e)
_out = sys.stdout.getvalue()
sys.stdout = sys.__stdout__
(_out, _err)
`;
  try {
    const result = await pyodide.runPythonAsync(wrappedCode);
    return [result.get(0) || "", result.get(1) || ""];
  } catch (e) {
    return ["", String(e)];
  }
}

function showOutput(text) {
  const sec = document.getElementById("output-section");
  document.getElementById("output-box").textContent = text || "(aucune sortie)";
  sec.classList.remove("hidden");
}

function showSubmitMsg(msg, color) {
  const el = document.getElementById("submit-msg");
  el.className = `rounded-xl p-4 text-sm font-medium bg-${color}-50 text-${color}-800 border border-${color}-200`;
  el.textContent = msg;
  el.classList.remove("hidden");
  el.scrollIntoView({ behavior: "smooth" });
}

function showError(msg) {
  showSubmitMsg("⚠ " + msg, "orange");
}

function formatDate(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" });
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
